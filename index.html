    function App() {

      const t = (key) => TRANSLATIONS[lang][key] !== undefined ? TRANSLATIONS[lang][key] : TRANSLATIONS['en'][key];
      const [expandedCard, setExpandedCard] = useState(null);
      const reportRef = useRef(null);
      const canvasRef = useRef(null);
      const activeLayer = useMemo(() => layers.find((l) => l.id === activeLayerId) || layers[0], [activeLayerId]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const W = canvas.offsetWidth;
        const H = canvas.offsetHeight;
        canvas.width = W;
        canvas.height = H;
        const NUM = 30;
        const dots = Array.from({ length: NUM }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4
        }));
        let rafId;
        let last = 0;
        const INTERVAL = 1000 / 30;
        function draw(ts) {
          rafId = requestAnimationFrame(draw);
          if (ts - last < INTERVAL) return;
          last = ts;
          ctx.clearRect(0, 0, W, H);
          dots.forEach((d) => {
            d.x += d.vx;
            d.y += d.vy;
            if (d.x < 0 || d.x > W) d.vx *= -1;
            if (d.y < 0 || d.y > H) d.vy *= -1;
          });
          for (let i = 0; i < NUM; i++) {
            for (let j = i + 1; j < NUM; j++) {
              const dx = dots[i].x - dots[j].x;
              const dy = dots[i].y - dots[j].y;
              if (Math.sqrt(dx * dx + dy * dy) < 120) {
                ctx.beginPath();
                ctx.moveTo(dots[i].x, dots[i].y);
                ctx.lineTo(dots[j].x, dots[j].y);
                ctx.strokeStyle = "rgba(37,99,235,0.05)";
                ctx.lineWidth = 1;
                ctx.stroke();
              }
            }
          }
          dots.forEach((d) => {
            ctx.beginPath();
            ctx.arc(d.x, d.y, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(37,99,235,0.15)";
            ctx.fill();
          });
        }
        rafId = requestAnimationFrame(draw);
        return () => cancelAnimationFrame(rafId);
      }, []);

      const exportPdf = async () => {
        if (!reportRef.current) return;

        if (!window.html2canvas || !window.jspdf) return;

        setIsExporting(true);
        try {
          await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
          await new Promise((resolve) => setTimeout(resolve, 700));

          const canvas = await window.html2canvas(reportRef.current, {
            scale: 3,
            useCORS: true,
            backgroundColor: "#f8fafc"
          });

          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF("p", "pt", "a4");

          const margin = 14;
          const pageWidth = pdf.internal.pageSize.getWidth();
          const pageHeight = pdf.internal.pageSize.getHeight();
          const printableWidth = pageWidth - margin * 2;
          const printableHeight = pageHeight - margin * 2;
          const pageHeightPx = Math.max(1, Math.floor((printableHeight * canvas.width) / printableWidth));
          let renderedHeight = 0;
          let pageIndex = 0;

          while (renderedHeight < canvas.height) {
            const sliceHeight = Math.min(pageHeightPx, canvas.height - renderedHeight);
            const pageCanvas = document.createElement("canvas");
            pageCanvas.width = canvas.width;
            pageCanvas.height = sliceHeight;
            const ctx = pageCanvas.getContext("2d");
            if (!ctx) break;

            ctx.drawImage(
              canvas,
              0,
              renderedHeight,
              canvas.width,
              sliceHeight,
              0,
              0,
              canvas.width,
              sliceHeight
            );

            const sliceData = pageCanvas.toDataURL("image/png");
            const sliceHeightPt = (sliceHeight * printableWidth) / canvas.width;

            if (pageIndex > 0) pdf.addPage();
            pdf.addImage(sliceData, "PNG", margin, margin, printableWidth, sliceHeightPt, undefined, "FAST");

            renderedHeight += sliceHeight;
            pageIndex += 1;
          }

          pdf.save("security-architecture-report.pdf");
        } finally {
          setIsExporting(false);
        }
      };

      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();

                ].map((phase, idx, arr) => (
                  <React.Fragment key={phase.id}>
                    <div className="flex-1 bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden" style={{ borderTop: `4px solid ${phase.color}` }}>
                      <div className="px-6 py-5">
                        <div className="flex items-center gap-3 mb-4">
                          <div className="w-10 h-10 rounded-full flex items-center justify-center" style={{ backgroundColor: phase.bg }}>
                            <Icon name={phase.icon} className="w-5 h-5" style={{ color: phase.color }} />
                          </div>
                          <span className="font-heading font-bold text-[#0F172A] text-sm">{phase.label}</span>
                        </div>
                        <ul className="space-y-2">
                          {phase.steps.map((step, i) => (
                            <li key={i} className="flex items-start gap-2 text-xs text-slate-600">
                              <span className="mt-1 shrink-0 w-2 h-2 rounded-full" style={{ backgroundColor: phase.color }}></span>
                              {step}
                            </li>
                          ))}
                        </ul>
                      </div>
                    </div>
                    {idx < arr.length - 1 && (
                      <div className="hidden lg:flex items-center justify-center w-8 shrink-0">
                        <div className="draw-line h-0.5 w-full" style={{ backgroundColor: "#CBD5E1", backgroundImage: "repeating-linear-gradient(to right, #CBD5E1 0, #CBD5E1 6px, transparent 6px, transparent 12px)" }}></div>
                      </div>
                    )}
                  </React.Fragment>
                ))}
              </div>
            </section>

            {/* Risks This Architecture Mitigates */}
            <section>
              <div className="mb-5">
                <h3 className="font-heading text-2xl font-bold text-[#0F172A] mb-1">{t('threatsTitle')}</h3>
                <p className="text-slate-500 text-sm max-w-3xl leading-relaxed">
                  {t('threatsSubtitle')}
                </p>
              </div>
              <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
                {[
                  { icon: "user-x", title: t('threat1Title'), desc: t('threat1Desc') },
                  { icon: "laptop", title: t('threat2Title'), desc: t('threat2Desc') },
                  { icon: "code", title: t('threat3Title'), desc: t('threat3Desc') },
                  { icon: "wifi", title: t('threat4Title'), desc: t('threat4Desc') },
                  { icon: "eye-off", title: t('threat5Title'), desc: t('threat5Desc') },
                  { icon: "door-open", title: t('threat6Title'), desc: t('threat6Desc') }
                ].map((risk, i) => (
                  <div key={i} className="bg-red-50 rounded-xl border border-slate-200 border-l-4 border-l-red-600 px-5 py-4 shadow-sm">
                    <div className="flex items-center gap-2 mb-2">
                      <Icon name={risk.icon} className="w-5 h-5 text-red-600" />
                      <span className="font-heading font-bold text-[#0F172A] text-sm">{risk.title}</span>
                    </div>
                    <p className="text-slate-600 text-xs leading-relaxed">{risk.desc}</p>
                  </div>
                ))}
              </div>
            </section>

            {/* Implementation Roadmap */}
            <section>
              <div className="mb-5">
                <h3 className="font-heading text-2xl font-bold text-[#0F172A] mb-1">{t('implTitle')}</h3>
                <p className="text-slate-500 text-sm max-w-3xl leading-relaxed">
                  {t('implSubtitle')}
                </p>
              </div>
              <div className="grid sm:grid-cols-2 gap-5">
                {[
                  { n: 1, title: t('impl1Title'), desc: t('impl1Desc'), delay: "fade-in-up-1" },
                  { n: 2, title: t('impl2Title'), desc: t('impl2Desc'), delay: "fade-in-up-2" },
                  { n: 3, title: t('impl3Title'), desc: t('impl3Desc'), delay: "fade-in-up-3" },
                  { n: 4, title: t('impl4Title'), desc: t('impl4Desc'), delay: "fade-in-up-1" },
                  { n: 5, title: t('impl5Title'), desc: t('impl5Desc'), delay: "fade-in-up-2" },
                  { n: 6, title: t('impl6Title'), desc: t('impl6Desc'), delay: "fade-in-up-3" }
                ].map((item) => (
                  <div key={item.n} className={"fade-in-up " + item.delay + " bg-white rounded-xl border border-slate-200 shadow-sm p-5 flex items-start gap-4"}>
                    <span className="text-3xl font-heading font-bold text-[#0F172A] leading-none shrink-0 w-8 text-center">{item.n}</span>
                    <div>
                      <p className="font-heading font-bold text-[#0F172A] text-sm mb-1">{item.title}</p>
                      <p className="text-slate-600 text-xs leading-relaxed">{item.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* Glossary */}
            <section>
              <div className="mb-5">
                <h3 className="font-heading text-2xl font-bold text-[#0F172A] mb-1">{t('glossaryTitle')}</h3>
                <p className="text-slate-500 text-sm max-w-3xl leading-relaxed">
                  {t('glossarySubtitle')}
                </p>
              </div>
              <div className="grid lg:grid-cols-2 gap-5">
                {[
                  { term: t('gMDM'), icon: "laptop", border: "border-[#2563EB]", def: t('gMDMDef') },
                  { term: t('gSSO'), icon: "log-in", border: "border-[#7C3AED]", def: t('gSSODef') },
                  { term: t('gMFA'), icon: "shield", border: "border-[#D97706]", def: t('gMFADef') },
                  { term: t('gZT'), icon: "globe", border: "border-[#16A34A]", def: t('gZTDef') },
                  { term: t('gSecret'), icon: "key", border: "border-[#0891B2]", def: t('gSecretDef') },
                  { term: t('gIdP'), icon: "user-check", border: "border-[#DC2626]", def: t('gIdPDef') },
                  { term: t('gObs'), icon: "eye", border: "border-[#0F172A]", def: t('gObsDef') }
                ].map((item) => (
                  <div key={item.term} className={"bg-white rounded-xl border border-slate-200 border-l-4 " + item.border + " p-5 shadow-sm flex items-start gap-4"}>
                    <Icon name={item.icon} className="w-5 h-5 mt-0.5 shrink-0 text-slate-400" />
                    <div>
                      <p className="font-heading font-bold text-[#0F172A] text-sm mb-1">{item.term}</p>
                      <p className="text-slate-600 text-xs leading-relaxed">{item.def}</p>
                    </div>
                  </div>
                ))}
              </div>
            </section>
          </main>

          {/* Footer */}
          <footer className="bg-[#0F172A] mt-12">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
              <span className="text-slate-400 text-xs">{t('footerLeft')}</span>
              <span className="text-slate-400 text-xs">{t('footerRight')}</span>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
